reflect:['What is the pattern in when you get overwhelmed? What do those situations have in common?','What is the cost to your relationships of shutting down instead of pausing and returning?'],
check:['I recognized the early warning signs','I communicated a pause rather than just shutting down','I used real regulation — not distraction','I came back to the conversation and completed it','I am curious about what the pattern tells me']}}},

{id:'c4',cat:'Conflict',icon:'⚖️',skill:'Advocacy',
title:'Speaking up when something feels wrong or unfair',
intro:'Many people witness or experience injustice — at school, at home, at work, or in the world — and stay quiet. This guide helps people of all ages understand when and how to speak up effectively.',
ages:{
'3-6':{
steps:[{t:"'That's not fair' is a valid thing to say",d:"Children are allowed to name injustice. 'That doesn't feel fair. Can you help me?' is a complete and appropriate statement.",tip:"Naming injustice is the first step. Validate it."},
{t:'Tell a grown-up immediately',d:"If something feels really wrong, go get a teacher or parent right now. You do not have to handle it yourself.",tip:"Escalation is appropriate and correct at this age."},
{t:'You will not get in trouble for telling',d:"Telling an adult about something wrong is the right thing to do.",tip:"Destigmatize reporting early."}],
say:[{s:"'That didn't feel fair. Can you help me?'",d:"Staying quiet because you think nothing will change."},{s:"'Something happened and I need to tell you.'",d:"'I don't want to be a tattletale.'"}],
watch:['Child is afraid to report — explore the fear','Child reports everything trivial — teach judgment about what rises to reporting'],
reflect:['Why is it important to tell a grown-up when something feels wrong?','What happens if everyone stays quiet when something unfair is happening?'],
check:['I told an adult when something felt really wrong','I did not try to handle it all by myself','I knew it was okay to speak up']},
'7-12':{
steps:[{t:'Distinguish tattling from reporting',d:"Tattling: telling to get someone in trouble. Reporting: telling to protect someone from harm. One is self-serving. One is brave.",tip:"This framing changes how children think about speaking up."},
{t:'Organize the facts first',d:"What happened? When? Who was involved? What did you see or hear? Specific, factual accounts are more effective than emotional appeals.",tip:"Credibility matters."},
{t:'Choose who to tell',d:"Who is most likely to actually do something? Sometimes that is a parent, a teacher, a counselor, or a principal.",tip:"Strategic about who to tell."},
{t:'Keep going if the first person does not act',d:"You are allowed to tell the next person up. Advocacy sometimes requires persistence.",tip:"Persistence in advocacy is not the same as being difficult."}],
say:[{s:"'I need to report something I witnessed. I want to give you the details so you can help address it.'",d:"'I saw something but I don't want to get involved.'"},{s:"'If this doesn't get addressed here, I will need to tell someone else.'",d:"Reporting once, getting no response, and giving up."}],
watch:['Child is witnessing something serious — escalate beyond this guide immediately to appropriate adults','Child is scared of retaliation — address safety alongside advocacy'],
reflect:['What is the difference between loyalty to someone and protecting them from harm?','What would you want someone to do if they saw something unfair happening to you?'],
check:['I understood why I was reporting — to protect, not to punish','I organized the facts clearly before reporting','I chose the right person to tell','I kept going if the first person did not act']},
'13-17':{
steps:[{t:'Know your rights',d:"In most schools, you have the right to report concerns and be protected from retaliation. Know what resources exist.",tip:"Knowledge is power in advocacy."},
{t:'Document everything',d:"Dates, times, what was said or done, who witnessed it. Written records are more powerful than memory.",tip:"Documentation transforms reports."},
{t:'Start with the appropriate internal channel',d:"A direct conversation or official report through proper channels first. Going public has costs and benefits — try internal first.",tip:"Sequence matters."},
{t:'Prepare for the possibility of nothing changing immediately',d:"Institutions often resist change. Your report may be the seed that grows slowly. That does not reflect on the truth of what you reported.",tip:"Manage expectations without dampening courage."},
{t:'Protect yourself',d:"Retaliation happens. Know who your support system is. Do not face it alone.",tip:"Sustainability of advocacy requires self-protection."}],
say:[{s:"'I'm reporting this formally because what happened was wrong and I want it documented.'",d:"'There's no point in reporting it — nothing will change.'"},{s:"'I've documented what I witnessed. I'm bringing it to you first, and if it doesn't get addressed, I'll be going to [next authority].'",d:"'I'll just post about it online instead of going through proper channels first.'"}],
watch:['Teen is reporting something serious — connect them with appropriate adult support alongside this guide','Teen faces retaliation — this becomes a safety issue that supersedes the original report'],
reflect:['What makes something worth the cost of speaking up?','What is the difference between speaking up because it is right and speaking up to be seen doing it?'],
check:['I documented the specifics in writing','I started with the appropriate internal channel','I have a next step ready if this channel does not respond','I have people who support me in this']},
'adults':{
steps:[{t:'Know what you are raising and what you want to happen',d:"Before you speak up, be clear: what is the concern, what evidence do you have, and what outcome are you seeking?",tip:"Prepared clarity is your most powerful tool."},
{t:'Start with the right level',d:"Go to your direct manager first for most issues. Bypass them only if they are part of the problem or the concern rises above their authority.",tip:'Sequence matters for institutional navigation.'},
{t:'Speak to behavior and impact, not character',d:"'The current practice of [x] creates [specific risk/harm]' is more effective than '[person] is unethical.'",tip:"Systems framing is more actionable and less personal."},
{t:'Document',d:"Write down what you reported, when, to whom, and their response. This protects you and creates a record of good-faith effort.",tip:"Documentation is self-protection."},
{t:'Know your escalation path',d:"If internal channels fail: HR, compliance, external regulatory bodies, legal counsel. Know the sequence ahead of time.",tip:"Know your path before you need to walk it."}],
say:[{s:"'I want to raise something formally and I want to document that I've raised it. The concern is [specific]. The impact is [specific]. I'm asking for [specific response].'",d:"'Something just feels off around here but I can't really say what...'"},{s:"'If this doesn't get addressed through this channel, I'll need to escalate to [next level]. I wanted to be transparent about that.'",d:"Venting to colleagues without ever reporting through proper channels."}],
watch:['Concern involves illegal activity — you may need legal counsel before acting','Retaliation feels likely — protect yourself first'],
reflect:['What is the cost of not speaking up? To you, to others, to the organization?','What is the cost of speaking up incorrectly — emotionally charged, poorly documented, wrong channel?'],
check:['I was clear on what I was raising and what I wanted','I started at the appropriate level','I focused on behavior and impact not character','I documented the report','I know my escalation path if needed']}}},

{id:'fa3',cat:'Family',icon:'🌊',skill:'Emotional Intelligence',
title:'Having hard conversations when home life is difficult',
intro:'For children and adults in difficult home situations — high conflict, mental illness, addiction, or instability — the task of naming feelings and asking for support is both more important and more complicated. This guide honors that reality.',
ages:{
'3-6':{
steps:[{t:'Find your safe person',d:"Who makes you feel safe? A grandparent, teacher, neighbor, or family friend. That person matters.",tip:'One safe adult is enough.'},
{t:"It is not your fault",d:"Whatever is hard at home — it is not because of you. You are loved even when things are messy.",tip:"This may need to be said explicitly and repeatedly."},
{t:'You are allowed to need things',d:"You are allowed to need a hug, help, comfort. Your needs are real and worth meeting.",tip:'Basic entitlement to care.'}],
say:[{s:"'Things at home feel scary sometimes. I feel better when I'm with you.'",d:"'Everything at my house is fine' when it isn't."},{s:"'I need someone to help me feel safe.'",d:"Pretending you are okay when you are not."}],
watch:['Child is in a genuinely unsafe situation — mandatory reporting and adult intervention, not this guide alone','Child is being parentified — taking care of adults emotional needs instead of the reverse'],
reflect:['Who makes you feel safe?','You do not have to fix anything at home. That is not your job.'],
check:['I know who my safe person is','I told them what I needed','I know it is not my fault']},
'7-12':{
steps:[{t:'You cannot fix your family',d:"Your parent's struggles, the conflict at home — none of that is yours to fix. You are allowed to focus on your own life.",tip:"Release from inappropriate responsibility."},
{t:'Find your outside places',d:"School, a friend's house, a sport, a library — places that feel stable when home is not.",tip:'External stabilizers matter enormously.'},
{t:'Tell one safe adult',d:"You do not have to tell the whole story. But having one adult outside your home who knows your life is hard gives you an anchor.",tip:"One knowing adult changes outcomes for children significantly."},
{t:'Your feelings are valid even when adults around you are not coping',d:"If the grown-ups around you are struggling, your feelings might get dismissed. They are still real. Find a place to put them.",tip:'Feelings need a witness.'}],
say:[{s:"'Things at home are hard right now. I don't need you to do anything — I just needed to tell someone.'",d:"'My family is fine' to every adult who might otherwise offer support."},{s:"'Can I spend some time here? It helps me feel better.'",d:"Isolating completely because home feels bad."}],
watch:['Child is in a dangerous situation — this guide is not enough; mandatory reporting may apply','Child is absorbing adult emotions and responsibilities — parentification warrants direct intervention'],
reflect:['What is one place outside of home where you feel like yourself?','What do you need that you are not getting? Is there anyone who could help with that?'],
check:['I know what I can and cannot control at home','I have found at least one safe outside space','I have told one adult what is actually going on','I know my feelings matter even when no one at home is acknowledging them']},
'13-17':{
steps:[{t:'Grieve the family you needed',d:"You may have a complicated relationship with a family that could not give you what you needed. That is a real loss and it deserves grief, not just coping.",tip:"Naming it as loss matters."},
{t:'Find chosen family',d:"Friends, mentors, coaches, teachers — the people you choose to be your people are real. You are allowed to depend on them.",tip:"Chosen relationship as legitimate attachment."},
{t:'Do not let the home environment become your identity',d:"What happens at home is not who you are. Your resilience, your values, your future — these are yours.",tip:"Identity apart from circumstances."},
{t:'Know the resources',d:"School counselors, hotlines, trusted adults — know what is available and do not wait for crisis to access them.",tip:"Resource awareness before acute need."},
{t:'Talk to someone who can actually help',d:"A therapist, school counselor, trusted adult — not as a burden but as a person with needs that deserve meeting.",tip:"Framing help-seeking as self-respect."}],
say:[{s:"'I want to be honest with you about what home is like. I'm not asking you to fix it — I just need you to know.'",d:"'My family is fine' while absorbing enormous amounts of stress alone."},{s:"'I've been handling a lot at home and I think I need more support than I've been asking for.'",d:"'It's fine. Lots of people have it worse.'"}],
watch:['Teen is in genuine danger — safety supersedes all else','Teen is parentified and struggling to ask for their own needs — help them understand it is allowed'],
reflect:['What has growing up in your family taught you that you want to carry forward? What do you want to leave behind?','What does the version of you at 25 need you to do right now?'],
check:['I named the reality of my situation to at least one safe person','I identified my outside anchors — people and places','I gave myself permission to grieve what I did not have','I know what resources exist and I am willing to use them']},
'adults':{
steps:[{t:'Grieve the family you needed',d:"If your family of origin could not give you what you needed, that is a real loss — not just something to cope with and move past.",tip:"Naming it as loss matters."},
{t:'Find chosen family',d:"Friends, mentors, therapists, communities — the people you choose to be your people are real attachments. You are allowed to depend on them.",tip:"Chosen relationship as legitimate attachment."},
{t:'Separate your history from your current identity',d:"What happened in your family is not who you are. The patterns you absorbed are not your destiny — they are your starting point.",tip:'Identity apart from history.'},
{t:'Get real support',d:"A therapist, a support group, a trusted community — not as a burden but as a person with needs that deserve meeting.",tip:"Framing help-seeking as self-respect."},
{t:'Make conscious choices about your family now',d:"How much contact? What topics are discussed? What are your limits? You have more agency than you may have exercised.",tip:"Conscious choice is agency."}],
say:[{s:"'I want to be honest with someone about what my home life has actually been like. I'm not asking you to fix it — I just need you to know.'",d:"'My family is fine' while carrying an enormous amount quietly."},{s:"'I've been managing this alone for a long time and I think I need real support.'",d:"'It's fine. Lots of people have it worse.'"}],
watch:['Patterns from family of origin are showing up in current relationships — this is where therapy can be most powerful','Contact with family is causing real harm — limits are appropriate and do not require justification'],
reflect:['What did you learn in your family about emotion, conflict, and love — and which of those lessons serve you now?','What would it mean to be in a family — your current one, chosen or otherwise — that feels different from what you grew up in?'],
check:['I named the reality of my family history honestly to at least one safe person','I identified my chosen family — people I can actually depend on','I have given myself permission to grieve what I did not have','I am making conscious choices about my family relationships rather than just absorbing them']}}},

{id:'r3',cat:'Romantic',icon:'💭',skill:'Vulnerability',
title:'Asking for what you need emotionally',
intro:'Many people never learn to ask for emotional support directly — they hint, perform the need, or go without. This guide teaches the skill of clear, direct emotional need expression without manipulation or apology.',
ages:{
'13-17':{
steps:[{t:'Name the feeling to yourself first',d:"What are you actually feeling right now? Not the behavior you want from your partner — the underlying emotional state. Sad? Anxious? Lonely?",tip:'Feelings first. Then needs.'},
{t:'Say the feeling out loud',d:"'I'm feeling really anxious right now' or 'I'm upset and I'm not okay.' The feeling itself, stated plainly.",tip:'Naming the feeling is the first act of asking.'},
{t:'Say what you need specifically',d:"'I need you to just sit with me.' 'I need to talk about this without you trying to fix it.' Specific is kinder than vague.",tip:"Specific asks can be met. Vague appeals often cannot."},
{t:'Check their capacity',d:"'Is now a good time to need something from you?' is a completely reasonable question. Their capacity matters too.",tip:"Their capacity matters too."}],
say:[{s:"'I'm feeling [emotion] and I need [specific]. Are you in a place for that right now?'",d:"[sighing loudly, being obviously upset, saying 'I'm fine' when they ask]"},{s:"'I know you can't always give me exactly what I need. This is what would help right now.'",d:"'You never know what I need!' [when you have not said what you need]"}],
watch:['You find it impossible to ask directly — the gap between this and what you actually do is worth exploring','Partner consistently cannot meet needs — this is information about the relationship worth understanding'],
reflect:['What story do you carry about what it means to have emotional needs? Where did that come from?','What would it change in your relationship if you could ask for what you needed directly?'],
check:['I named the emotion to myself first','I said it out loud — the actual feeling','I asked for something specific','I checked their capacity to give it']},
'adults':{
steps:[{t:'Name the emotion first — to yourself',d:"What are you actually feeling right now? Not the behavior you want from your partner — the underlying emotional state.",tip:'Feelings first. Then needs.'},
{t:'Say the feeling out loud',d:"'I'm feeling really anxious right now' or 'I'm grieving something and I'm not okay.' The feeling itself, stated plainly.",tip:'Naming the feeling is the first act of asking.'},
{t:'Say what you need specifically',d:"'I need you to just sit with me.' 'I need to talk about this without you trying to fix it.' Specific is kinder than vague.",tip:"Specific asks can be met. Vague appeals often cannot."},
{t:'Check their capacity',d:"'Is now a good time to need something from you?' is a reasonable question. Their capacity matters too.",tip:"Their capacity matters too."},
{t:'Receive what they give without devaluing it',d:"If they try but it is not quite right, build on it: 'Thank you — it's helping. I could use a little more [x] if possible.'",tip:"Perfect is the enemy of good in emotional support."}],
say:[{s:"'I'm feeling [emotion] and I need [specific]. Are you in a place to give me that right now?'",d:"[sighing loudly, being obviously upset, saying 'I'm fine' when they ask]"},{s:"'Thank you for being here. It's helping. I could use a little more [x] if you can.'",d:"'That's not really what I needed' [after they tried]"}],
watch:['You find it impossible to ask directly — the gap between this and what you actually do is worth exploring in therapy','Partner consistently cannot meet needs — information about the relationship worth examining together'],
reflect:['What story do you carry about what it means to have emotional needs? Where did that come from?','What would it change in your closest relationships if you could ask for what you needed directly?'],
check:['I named the emotion to myself first','I said it out loud — the actual feeling','I asked for something specific','I checked their capacity to give it','I received what they gave and built on it']}}},

{id:'r4',cat:'Romantic',icon:'🛤️',skill:'Transparency',
title:'Talking about the future — and whether it aligns',
intro:'Conversations about the future — children, where to live, career, values, and what you both want — are often avoided until they become crises. This guide helps you have them earlier, honestly, and without manufactured urgency.',
ages:{
'13-17':{
steps:[{t:'Know what you actually want first',d:"What do YOU want? Not what seems reasonable or what you think they want to hear. Your actual feelings about the relationship and where it's going.",tip:'You cannot have this conversation without clarity about your own answer.'},
{t:'Create the context — do not ambush',d:"'I'd like to talk about us and where we're headed. Can we find some time?' A small amount of warning means they can actually show up for the conversation.",tip:'Ambush produces defenses. Context produces presence.'},
{t:'Say your truth plainly',d:"'Here's where I am: [honest statement about what you want from this relationship].' Not a performance. Not a manipulation. Just true.",tip:'Your truth, stated plainly, is the starting point.'},
{t:'Ask a direct open question',d:"'How are you feeling about us?' or 'I'd love to know where you are.' Open, not leading.",tip:'Open questions get honest answers. Leading questions get managed ones.'}],
say:[{s:"'I'd like to talk about us — not to put pressure on anything, just because I'd like to actually know where we both are. Can we do that?'",d:"'So... I mean... I'm not like, saying we have to put a label on it or whatever...'"},{s:"'Here's where I am honestly: [true statement]. I'd love to know where you are.'",d:"Assuming you are on the same page because the conversation has not happened."}],
watch:['You have been avoiding this conversation for months — the avoidance itself is telling you something','Their answer is not what you hoped for — make sure you respond to what they actually said, not what you wish they had said'],
reflect:['What are you actually afraid of finding out? Is that fear directing the conversation?','What would it mean for your self-respect to know clearly — even if the answer is not what you wanted?'],
check:['I knew what I actually wanted before I started the conversation','I gave them some context rather than ambushing them','I stated my truth plainly','I asked an open honest question','I received their answer for what it actually was']},
'adults':{
steps:[{t:'Name that you want to have the conversation — in advance',d:"'I'd like to talk about [future topic] when you have the time. It's not urgent — but it matters to me.' This gives both people time to think.",tip:"Advance notice transforms the tone of the conversation."},
{t:'Share your own picture first — fully',d:"What do you actually want? Not what seems reasonable or what you think they want to hear. Your actual picture.",tip:"Your real desire, not your negotiated desire."},
{t:'Ask for their actual picture',d:"'What do you actually see for yourself?' Not 'are you okay with what I want' — their actual, unconstrained vision.",tip:"Their real desire, not their reaction to yours."},
{t:'Identify the overlap — and the gaps',d:"Where do you both want the same things? Where is there genuine difference? Name both explicitly.",tip:"Honesty about gaps is the only path to addressing them."},
{t:'Come back to it',d:"One conversation rarely resolves big future questions. Agree to keep talking. Check in on this regularly.",tip:"This is an ongoing conversation, not a one-time decision."}],
say:[{s:"'I'd love to talk about [what we each want from this relationship / children / where we might live] — not to pressure anything, just because I think we're at a place where it's worth actually talking about it.'",d:"'I mean, eventually we'll figure out the kids thing, right?'"},{s:"'I want to hear your actual picture — not just what you think I want to hear. I can handle the real answer.'",d:"'Obviously we'd both want [x], right?' [assuming]"}],
watch:['The gap you discover is genuinely significant — do not paper over it; significant incompatibility discovered clearly is better than discovered after more investment','One person has already made internal decisions that the other does not know about — this is a disclosure issue as much as a planning issue'],
reflect:['Have you been avoiding this conversation because you are afraid of what you will find out?','What do you actually want — for yourself — and does your partner know that?'],
check:['I gave advance notice rather than ambushing them','I shared my actual picture not my negotiated one','I asked for their actual picture not their reaction to mine','I named both the overlap and the gaps honestly','I agreed to keep talking rather than treating this as a one-time resolution']}}},

{id:'w3',cat:'Workplace',icon:'📣',skill:'Authenticity',
title:'Sharing a different idea or vision than your team',
intro:'There are moments in professional life when you see something — a better way, a missed opportunity, a direction heading wrong — and do not know how to say it. This guide helps you advocate for your vision without blowing up your professional standing.',
ages:{
'13-17':{
steps:[{t:'Make sure you actually understand the current approach',d:"Before you advocate for a different one, genuinely understand why the current direction was chosen. There may be context you do not have.",tip:"Understanding precedes advocacy."},
{t:'Frame it as adding to, not opposing',d:"'I've been thinking about how we could build on what we're doing...' rather than 'I think this is the wrong approach.'",tip:"Addition is easier to receive than opposition."},
{t:'Come with a specific idea not just a critique',d:"'Here's what I'd suggest instead, and here's why' is far more influential than 'I don't think this is working.'",tip:"Critique without proposal is just venting."},
{t:'Be genuinely open to being wrong',d:"If your idea is examined and found to be weaker, that is valuable information. Go in with real openness.",tip:"Openness to being wrong makes your advocacy more credible."}],
say:[{s:"'I've been thinking about this project and I have an idea I'd love to share. Would you be open to hearing it?'",d:"'Honestly I think we're going in the completely wrong direction.'"},{s:"'I'm open to being shown why this doesn't work — I'd just love for the idea to actually get considered.'",d:"Going around to everyone else before talking to the person in charge."}],
watch:['Your idea requires someone to admit a mistake — this has different political dynamics and requires more care','You are being dismissed without a real hearing — this is worth naming directly: I would like this to actually get considered before it is set aside'],
reflect:['How much of your conviction that you are right is based on evidence vs. how it feels from where you sit?','What would it take for you to update your view?'],
check:['I understood the current approach and its reasoning before advocating','I framed my idea as building on rather than opposing','I came with a proposal not just a critique','I was genuinely open to learning that I was wrong']},
'adults':{
steps:[{t:'Make sure you actually understand the current vision',d:"Before you advocate for a different one, make sure you understand why the current direction was chosen. There may be context you do not have.",tip:"Understanding precedes advocacy."},
{t:'Frame it as building on, not opposing',d:"'I've been thinking about how we could extend what we're doing into...' rather than 'I think we're going in the wrong direction.'",tip:"Addition is easier to receive than opposition."},
{t:'Have a proposal — not just a critique',d:"'Here's what I'd suggest instead, and here's why' is far more influential than 'I don't think this is the right approach.'",tip:"Critique without proposal is just venting."},
{t:'Choose who you share it with carefully and in what order',d:"A direct conversation with your manager before a broader push. Building support before presenting. Understanding the politics of the idea.",tip:"Sequencing is strategy."},
{t:'Be genuinely open to being wrong',d:"If your idea is genuinely examined and found to be weaker than the current direction, that is valuable. Go in with real openness.",tip:"Openness to being wrong makes your advocacy more credible."}],
say:[{s:"'I've been thinking about how we might extend [current direction] and I have a different angle I'd love to share. Would you be open to hearing it?'",d:"'I honestly think we're going in the completely wrong direction.'"},{s:"'I want to be clear that I'm genuinely open to being shown why this doesn't work — I'd just love for the idea to actually get considered.'",d:"Sharing the idea laterally with colleagues before talking to your manager."}],
watch:['Your vision would require the organization to admit a mistake — this has different political dynamics','You are being dismissed without a real hearing — worth naming directly'],
reflect:['How much of your conviction that you are right is based on evidence vs. how it feels from where you sit?','What would it take for you to update your view?'],
check:['I understood the current vision and its reasoning before advocating','I framed my idea as building on rather than opposing','I came with a proposal not just a critique','I chose who I talked to and in what order strategically','I was genuinely open to learning that I was wrong']}}},

{id:'s3',cat:'Social',icon:'💡',skill:'Emotional Intelligence',
title:'Receiving criticism without shutting down or attacking',
intro:'The ability to receive feedback or criticism without defensiveness is one of the rarest and most valuable emotional skills at any age. Most people either shut down or counter-attack. Both prevent growth. This guide teaches the third option.',
ages:{
'7-12':{
steps:[{t:'Take a breath before you react',d:"When someone says something critical, your first feeling is usually hurt or anger. That is normal. Breathe before you respond.",tip:"The pause is everything."},
{t:'Listen for the part that might be true',d:"Even if the feedback feels unfair or is delivered poorly, is there any part of it that has some truth in it? Look for that first.",tip:"Finding the grain of truth is a skill, not a defeat."},
{t:'Ask a question instead of defending',d:"'Can you tell me more about what you mean?' buys time, shows maturity, and often gets you more useful information.",tip:"Curiosity before defense."},
{t:'You can disagree — later',d:"If there are parts of the feedback that are genuinely unfair, you can address those — but after you have acknowledged what might be true.",tip:"Acknowledge first. Disagree after. The order matters."}],
say:[{s:"'That's hard to hear. Can you tell me more about what you mean?'",d:"'That's so unfair! You don't understand!'"},{s:"'I think you're right that [part of it]. I want to think about the rest.'",d:"'Fine. Whatever.' [shutdown]"}],
watch:['Child finds it physically impossible to receive any criticism — this is worth exploring; the roots are often in early experiences of criticism as punishment','Child agrees with everything and then does not change — performative acceptance is its own defense'],
reflect:['What does criticism feel like in your body? Where does it go?','When has feedback changed you in a way that mattered? What made that possible?'],
check:['I paused before responding','I looked for the part that might be true','I asked a question before defending','I acknowledged what was true','I saved my disagreement for after']},
'13-17':{
steps:[{t:'Create a pause before responding',d:"Your nervous system is going to want to respond immediately — either with deflection or retaliation. Pause. Take three seconds before you say anything.",tip:'The pause is the most important thing on this list.'},
{t:'Listen for the signal in the noise',d:"Criticism is often delivered imperfectly. Even if the delivery is poor, there may be something true in it. Your job is to find the signal — the part that might be useful.",tip:'Separate the message from the delivery method.'},
{t:'Ask for clarification before defending',d:"'Can you say more about what you mean by that?' This buys time, demonstrates good faith, and might give you more useful information.",tip:"Curiosity before defense."},
{t:'Acknowledge what is true',d:"Even if you disagree with most of it, is there anything in it that is accurate? Name that first. Selective acknowledgment is not capitulation.",tip:'Partial acknowledgment is possible and powerful.'},
{t:'Address what you disagree with — later',d:"If there are things in the feedback that are genuinely unfair or inaccurate, address them — but after acknowledging what is true, and after you have had time to regulate.",tip:'Defense after acknowledgment is far more credible than immediate counter-attack.'}],
say:[{s:"'That's hard to hear. Can I take a moment? [pause] I think you're right that [specific element]. I want to think more about the rest.'",d:"'That's incredibly unfair and I can't believe you're saying that.'"},{s:"'Can you tell me more about what you mean by that?'",d:"'Well, the reason I did that is because YOU have been [list of countergrievances].'"}],
watch:['Teen finds it physically impossible to receive any criticism — worth exploring deeply; roots are often in early experiences of criticism as punishment or rejection','Teen receives criticism by completely agreeing with everything and then not changing — performative acceptance is its own defense'],
reflect:['What does criticism feel like in your body? Where does it live?','When has feedback changed you in a way that mattered? What made that possible?'],
check:['I paused before responding','I looked for the signal even if the delivery was rough','I asked for clarification before defending','I acknowledged what was true','I addressed disagreement after — separately from my initial response']},
'adults':{
steps:[{t:'Create a pause before responding',d:"Your nervous system is going to want to respond immediately — either with deflection or retaliation. Pause. Take three seconds before you say anything.",tip:'The pause is the most important thing on this list.'},
{t:'Listen for the signal in the noise',d:"Criticism is often delivered imperfectly. Even if the delivery is poor, there may be something true in it. Find the signal.",tip:'Separate the message from the delivery method.'},
{t:'Ask for clarification before defending',d:"'Can you say more about what you mean by that?' This buys time, demonstrates good faith, and might give you more useful information.",tip:"Curiosity before defense."},
{t:'Acknowledge what is true',d:"Even if you disagree with most of it, is there anything in it that is accurate? Name that. Selective acknowledgment is not capitulation.",tip:'Partial acknowledgment is possible and powerful.'},
{t:'Address what you disagree with — later',d:"If there are things that are genuinely unfair or inaccurate, address them — but after acknowledging what is true, and after you have had time to regulate.",tip:'Defense after acknowledgment is far more credible than immediate counter-attack.'}],
say:[{s:"'That's hard to hear. Can I take a moment? [pause] I think you're right that [specific element]. I want to think more about the rest.'",d:"'That's incredibly unfair and I can't believe you're saying that.'"},{s:"'Can you tell me more about what you mean by that?'",d:"'Well, the reason I did that is because YOU have been [list of countergrievances].'"}],
watch:['You find it physically impossible to receive any criticism — worth exploring deeply; roots are often in early experiences of criticism as punishment','You receive criticism by completely agreeing with everything and then not changing — performative acceptance is its own defense'],
reflect:['What does criticism feel like in your body? Where does it live?','When has feedback changed you in a way that mattered? What made that possible?'],
check:['I paused before responding','I looked for the signal even if the delivery was rough','I asked for clarification before defending','I acknowledged what was true','I addressed disagreement after — separately from my initial response']}}},

{id:'s4',cat:'Social',icon:'🤲',skill:'Empathy',
title:'Being present for someone who is struggling',
intro:'When someone we love is in real pain, our instinct to fix it can push them away. This guide teaches how to be genuinely present at any age — which is almost always more helpful than advice.',
ages:{
'3-6':{
steps:[{t:'Stay with them',d:"Do not leave. Sit next to them. Your presence says more than any words.",tip:'Presence is the most powerful thing at this age.'},
{t:'Use simple kind words',d:"'I'm here.' 'You're not alone.' 'Do you want a hug?' Small, warm, simple.",tip:'Short and warm. No lecturing.'},
{t:'Tell a grown-up if you are worried',d:"If a friend seems really sad or hurt, it is always okay to tell a trusted adult.",tip:'Knowing when to escalate is a skill.'}],
say:[{s:"'I'm here. You're not alone.'",d:"'Don't cry! It's not a big deal.'"},{s:"'Do you want to talk about it? Or do you just want me to sit with you?'",d:"'At least you still have [x]."}],
watch:["Child does not know what to do — that's okay. Teaching presence without needing to fix is the lesson","Child becomes distressed by their friend's distress — help them regulate their own feelings first"],
reflect:['How did it feel to just be there without trying to fix it?','What would you want a friend to do if you were the one who was sad?'],
check:['I stayed with the person instead of leaving','I said something kind and simple','I asked if they wanted to talk or just have company','I told a grown-up if I was worried about them']},
'7-12':{
steps:[{t:'Resist the fix impulse',d:"Your first job is not to solve anything. Your first job is to be with them in it. Sit with the discomfort of not being able to make it better.",tip:"Presence, not solutions."},
{t:'Ask before you offer',d:"'What do you need from me right now? Do you want to talk about it, or do you just want company?' Then do the thing they asked for.",tip:"Never assume which kind of support is needed."},
{t:'Reflect back what you are hearing',d:"'It sounds like you're feeling really [emotion]. Is that right?' This tells them you are actually listening.",tip:"Accurate reflection is a profound gift."},
{t:'Do not minimize or compare',d:"'At least...' and 'I know someone who...' are exits from their experience, not bridges to it.",tip:"Comparison and minimizing, even well-intentioned, are isolating."}],
say:[{s:"'I'm here. You don't have to be okay. What do you need?'",d:"'At least you have [x]. Things could be so much worse.'"},{s:"'It sounds like you're feeling really [emotion]. Is that right?'",d:"'I know exactly how you feel — when the same thing happened to me...' [taking it over]"}],
watch:['Your own discomfort with their pain is driving the fix impulse — sit with your own discomfort first','Friend is in genuine crisis — being there includes actively helping them get adult support'],
reflect:['When have you been in pain and someone was truly there for you? What did they do?','What makes it hard for you to just be present without trying to fix things?'],
check:['I asked what kind of support they needed before assuming','I reflected back what I was hearing','I did not minimize compare or silver-lining it','I got a grown-up if I was worried about their safety']},
'13-17':{
steps:[{t:'Resist the fix impulse',d:"Your first job is not to solve anything. Your first job is to be with them in it. Sit with the discomfort of not being able to make it better.",tip:"Presence, not solutions."},
{t:'Ask before you offer',d:"'What do you need from me right now? Do you want to be heard, or do you want help thinking through options?'",tip:"Never assume which kind of support is needed."},
{t:'Reflect back',d:"Name what you are hearing: 'It sounds like you're feeling [emotion]. Is that right?' This tells them you are actually listening.",tip:"Accurate reflection is a profound gift."},
{t:'Do not minimize or compare',d:"'At least' and 'I know someone who' are exits from their experience, not bridges to it.",tip:"Comparison and minimizing, even well-intentioned, are isolating."},
{t:'Follow up',d:"A text a few days later — 'I've been thinking about you. How are you doing?' — matters enormously.",tip:"Follow-up is where real friendship lives."}],
say:[{s:"'I'm here. You don't have to be okay. What do you need?'",d:"'At least you have [x]. Things could be so much worse.'"},{s:"'I've been thinking about what you shared. How are you doing today?'",d:"'Let me know if you need anything.' [never follows up]"}],
watch:['Your own discomfort with their pain is driving the fix impulse — sit with your own discomfort first','Friend is in genuine crisis (safety risk) — being there includes actively helping them get professional support'],
reflect:['When have you been in pain and someone was truly there for you? What did they do?','What makes it hard for you to just be present without trying to fix things?'],
check:['I asked what kind of support they needed before assuming','I reflected back what I was hearing','I did not minimize compare or silver-lining it','I followed up in the days after','I helped them access more support if they needed it']},
'adults':{
steps:[{t:'Resist the fix impulse',d:"Your first job is not to solve anything. Your first job is to be with them in it. Sit with the discomfort of not being able to make it better.",tip:"Presence, not solutions."},
{t:'Ask before you offer',d:"'What do you need from me right now? Do you want to be heard, or do you want help thinking through options?' Then do the thing they asked for.",tip:"Never assume which kind of support is needed."},

// ─── STATE ──────────────────────────────────────────────
let cur = null;
const AGE_BANDS = [
  {key:'3-6',   label:'Ages 3–6',    short:'3–6'},
  {key:'7-12',  label:'Ages 7–12',   short:'7–12'},
  {key:'13-17', label:'Ages 13–17',  short:'13–17'},
  {key:'adults',label:'Adults',      short:'Adults'},
];

// ─── SIDEBAR ────────────────────────────────────────────
function buildSidebar(convs) {
  const el = document.getElementById('sblist');
  el.innerHTML = '';
  const cats = [...new Set(convs.map(c => c.cat))];
  cats.forEach(cat => {
    const items = convs.filter(c => c.cat === cat);
    if (!items.length) return;
    const lbl = document.createElement('div');
    lbl.className = 'cat-lbl'; lbl.textContent = cat;
    el.appendChild(lbl);
    items.forEach(c => {
      const d = document.createElement('div');
      d.className = 'sitem' + (cur && cur.id === c.id ? ' on' : '');
      // Show which age bands are available
      const bands = AGE_BANDS.filter(b => c.ages[b.key]).map(b => b.short).join(' · ');
      d.innerHTML = `<span class="sitem-icon">${c.icon}</span>
        <span class="sitem-text">
          <span class="sitem-title">${c.title}</span>
          <span class="sitem-sub">${bands}</span>
        </span>`;
      d.onclick = () => openGuide(c);
      el.appendChild(d);
    });
  });
  if (!el.children.length) {
    el.innerHTML = '<div class="norec">No results found.</div>';
  }
}

function filterList(q) {
  const lower = q.toLowerCase();
  const filtered = CONVS.filter(c =>
    c.title.toLowerCase().includes(lower) ||
    c.cat.toLowerCase().includes(lower) ||
    c.skill.toLowerCase().includes(lower)
  );
  buildSidebar(filtered);
}

// ─── WELCOME ─────────────────────────────────────────────
function showWelcome() {
  document.getElementById('content').innerHTML = `
  <div class="welcome">
    <div class="w-hero">
      <div class="w-ey">Communication · Empathy · Growth</div>
      <div class="w-title">The conversations<br>that matter <em>most</em></div>
      <div class="w-desc">Pick any topic. Then choose the age group that fits — every guide adapts its language, examples, and approach to where you actually are in life.</div>
      <div class="w-stats">
        <div class="w-stat"><div class="w-stat-v">${CONVS.length}</div><div class="w-stat-l">Topics</div></div>
        <div class="w-stat"><div class="w-stat-v">4</div><div class="w-stat-l">Age groups</div></div>
        <div class="w-stat"><div class="w-stat-v">10</div><div class="w-stat-l">Skills taught</div></div>
      </div>
    </div>
    <div class="w-how">
      <div class="w-how-title">How it works</div>
      <div class="w-how-steps">
        <div class="w-how-step"><div class="w-how-num">1</div><span>Pick a conversation topic from the left sidebar</span></div>
        <div class="w-how-step"><div class="w-how-num">2</div><span>Choose the age tab that fits — Ages 3–6, 7–12, 13–17, or Adults</span></div>
        <div class="w-how-step"><div class="w-how-num">3</div><span>Read the step-by-step guide and see what to say vs. what to avoid</span></div>
        <div class="w-how-step"><div class="w-how-num">4</div><span>Reflect and use the self-check to see how the conversation went</span></div>
      </div>
    </div>
    <button class="w-cta" onclick="openGuide(CONVS[0])">Start with the first topic →</button>
  </div>`;
}

// ─── OPEN GUIDE ──────────────────────────────────────────
function openGuide(c) {
  cur = c;
  buildSidebar(CONVS); // refresh sidebar active state

  // Figure out which bands this topic has
  const availBands = AGE_BANDS.filter(b => c.ages[b.key]);
  const firstBand = availBands[0];

  let html = `<div class="guide">
    <div class="g-bc">
      <span onclick="showWelcome()" style="cursor:pointer;text-decoration:underline">Home</span>
      <span>›</span><span>${c.cat}</span><span>›</span><span>${c.title}</span>
    </div>
    <div class="g-title">${c.title}</div>
    <div class="g-tags">
      <span class="g-tag cat">📂 ${c.cat}</span>
      <span class="g-tag skill">✦ ${c.skill}</span>
    </div>
    <div class="g-intro">${c.intro}</div>`;

  // Age band tabs
  if (availBands.length > 1) {
    html += `<div class="age-tabs">`;
    availBands.forEach((b, i) => {
      html += `<button class="age-tab${i === 0 ? ' on' : ''}" onclick="switchBand(this, '${c.id}', '${b.key}')">
        ${b.short}<span class="age-tab-label">${b.label}</span>
      </button>`;
    });
    html += `</div>`;
  }

  // Render each band's content (only first visible)
  availBands.forEach((b, i) => {
    html += `<div class="band-content" id="band-${c.id}-${b.key}" style="display:${i === 0 ? 'block' : 'none'}">`;
    html += renderContent(c.ages[b.key], c.id + b.key);
    html += `</div>`;
  });

  html += `</div>`;
  document.getElementById('content').innerHTML = html;
  document.getElementById('main').scrollTo(0, 0);
}

function switchBand(btn, cid, bandKey) {
  // Update tab active state
  btn.closest('.age-tabs').querySelectorAll('.age-tab').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  // Show correct content
  document.querySelectorAll(`[id^="band-${cid}-"]`).forEach(el => el.style.display = 'none');
  const target = document.getElementById(`band-${cid}-${bandKey}`);
  if (target) target.style.display = 'block';
}

function renderContent(age, uid) {
  let html = '';

  // Steps
  if (age.steps && age.steps.length) {
    html += `<div class="g-sec"><div class="g-sec-lbl">Step by step</div><div class="steps">`;
    age.steps.forEach((s, i) => {
      html += `<div class="step">
        <div class="step-n">${i + 1}</div>
        <div class="step-body">
          <div class="step-t">${s.t}</div>
          <div class="step-d">${s.d}</div>
          ${s.tip ? `<div class="step-tip">💡 ${s.tip}</div>` : ''}
        </div>
      </div>`;
    });
    html += `</div></div>`;
  }

  // Scripts
  if (age.say && age.say.length) {
    html += `<div class="g-sec"><div class="g-sec-lbl">What to say — and what to avoid</div><div class="scripts">`;
    age.say.forEach(p => {
      html += `<div class="spair">
        <div class="sbox say">
          <div class="s-lbl sy">✓ Try saying this</div>
          <div class="s-txt">${p.s}</div>
        </div>
        <div class="sbox dont">
          <div class="s-lbl dn">✗ Instead of this</div>
          <div class="s-txt">${p.d}</div>
        </div>
      </div>`;
    });
    html += `</div></div>`;
  }

  // Watch for
  if (age.watch && age.watch.length) {
    html += `<div class="g-sec"><div class="g-sec-lbl">What to watch for</div><div class="wlist">`;
    age.watch.forEach(w => {
      html += `<div class="wi"><span style="flex-shrink:0">👁️</span><span>${w}</span></div>`;
    });
    html += `</div></div>`;
  }

  // Reflection
  if (age.reflect && age.reflect.length) {
    html += `<div class="ref-card">
      <div class="ref-title">Reflection prompts</div>
      <div class="ref-qs">`;
    age.reflect.forEach(r => {
      html += `<div class="ref-q">${r}</div>`;
    });
    html += `</div></div>`;
  }

  // Self-check
  if (age.check && age.check.length) {
    const id = 'ck' + uid;
    html += `<div class="ck-card">
      <div class="ck-title">Self-check</div>
      <div class="ck-sub">After the conversation, tick what you actually did:</div>
      <div class="ck-list" id="${id}">`;
    age.check.forEach((c, i) => {
      html += `<div class="ci" id="${id}-${i}" onclick="toggleCk('${id}-${i}','${id}')">
        <div class="ci-box" id="${id}-${i}-box"></div>
        <div class="ci-txt">${c}</div>
      </div>`;
    });
    html += `</div>
      <div class="sc-result" id="${id}-res"></div>
    </div>`;
  }

  return html;
}

function toggleCk(itemId, listId) {
  const item = document.getElementById(itemId);
  const box = document.getElementById(itemId + '-box');
  const checked = item.classList.contains('chk');
  if (checked) {
    item.classList.remove('chk');
    box.textContent = '';
  } else {
    item.classList.add('chk');
    box.textContent = '✓';
  }
  const list = document.getElementById(listId);
  const items = list.querySelectorAll('.ci');
  const total = items.length;
  const done = [...items].filter(el => el.classList.contains('chk')).length;
  const res = document.getElementById(listId + '-res');
  if (done === 0) { res.className = 'sc-result'; return; }
  res.className = 'sc-result show';
  const pct = done / total;
  if (pct === 1) {
    res.className = 'sc-result show good';
    res.textContent = '✦ You showed up fully for this conversation. That takes real courage and skill.';
  } else if (pct >= 0.6) {
    res.className = 'sc-result show ok';
    res.textContent = `You did ${done} of ${total}. Solid effort — notice what you missed and try it next time.`;
  } else {
    res.className = 'sc-result show low';
    res.textContent = `You did ${done} of ${total}. This is where growth starts. Pick one thing to try differently next time.`;
  }
}

// ─── BOOT ────────────────────────────────────────────────
buildSidebar(CONVS);
showWelcome();
</script>

</html>
